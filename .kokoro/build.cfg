# -*- protobuffer -*-
# proto-file: google3/devtools/kokoro/config/proto/build.proto
# proto-message: BuildConfig

build_file: "GoogleCloudPlatform/activation-model-scanner/.kokoro/build.sh"
container_properties {
  docker_image: "us-docker.pkg.dev/artifact-foundry-prod/docker-3p-trusted/python@sha256:0b3498e251759df85a00474be7d3b791d6abe1600ce3531a649e42964749655f"
}

fileset_artifacts {
  name: "artifacts"
  artifact_globs: "artifacts/*"
  error_if_missing: true
  destinations {
    store_attestation: true
    gcs {
      gcs_root_path: "oss-exit-gate-prod-projects-bucket/ams-scanner/pypi/attestations"
    }
  }
  generate_sbom_from_fileset: true
  generate_attestation: true
}
